name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install Python test dependency
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Install browser engines
        run: python -m playwright install --with-deps chromium webkit

      - name: Run static, Chromium, and WebKit suites
        run: python tests/run_tests.py --browsers chromium,webkit

  ios-tests:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false

      - name: Install locked JavaScript dependencies
        run: npm ci --ignore-scripts

      - name: Build and synchronize the offline iOS bundle
        run: npm run ios:sync

      - name: Run iOS UI and accessibility tests
        run: >-
          xcodebuild test
          -project ios/App/App.xcodeproj
          -scheme App
          -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.5'
          -derivedDataPath "$RUNNER_TEMP/EchoCaveDerivedData"
          CODE_SIGNING_ALLOWED=NO

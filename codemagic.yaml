workflows:
  gigfit-ci:
    name: GigFit CI
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: edge
      vars:
        XCODE_PROJECT: GigFit.xcodeproj
        XCODE_SCHEME: GigFit
        TEST_SCHEME: GigFitTests
    scripts:
      - name: Build app for simulator
        script: |
          xcodebuild \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            build
      - name: Build tests for simulator
        script: |
          xcodebuild \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$TEST_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            build-for-testing
    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

  gigfit-testflight:
    name: GigFit TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: edge
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: com.suliemansworld.GigFit
        XCODE_PROJECT: GigFit.xcodeproj
        XCODE_SCHEME: GigFit
    scripts:
      - name: Set build number
        script: |
          : "${BUILD_NUMBER:?BUILD_NUMBER is required}"
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion $BUILD_NUMBER" \
            "$CM_BUILD_DIR/GigFit/Resources/Info.plist"
          /usr/libexec/PlistBuddy \
            -c "Print :CFBundleVersion" \
            "$CM_BUILD_DIR/GigFit/Resources/Info.plist"
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificates
        script: keychain add-certificates
      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Build IPA for TestFlight
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
